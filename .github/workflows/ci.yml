name: Backend CI Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun global modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies (Include DevDependencies to test)
        run: bun install

      - name: Check Linting (Clean Code)
        run: bun run lint

      - name: Run Unit/Integration Tests (Phase 1)
        run: bun test

      - name: Build Production Artifacts (Phase 2)
        run: bun run build
